<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px;}
        h2 { color: #333; text-align: center; border-bottom: 2px solid #007BFF; padding-bottom: 10px; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007BFF; color: white; }
        tr:hover { background-color: #f1f1f1; }

        /* Form Styles */
        form { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; margin-top: 15px;}
        input[type="text"], input[type="number"], input[type="email"] {
            flex: 1 1 30%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;
        }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registered Customers Dashboard</h2>
    <table>
        <thead>
            <tr>
                <th>Customer ID</th>
                <th>Name</th>
                <th>Mobile Number</th>
                <th>Email</th>
                <th>Location</th>
            </tr>
        </thead>
        <tbody>
            {% for customer in customers_data %}
            <tr>
                <td>{{ customer.cus_id }}</td>
                <td>{{ customer.cus_name }}</td>
                <td>{{ customer.cus_mobile }}</td>
                <td>{{ customer.cus_email }}</td>
                <td>{{ customer.cus_add }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="container">
    <h2>Add New Customer</h2>
    <form action="/add_customer" method="POST">
        <input type="number" name="cus_id" placeholder="Customer ID (e.g. 103)" required>
        <input type="text" name="cus_name" placeholder="Full Name" required>
        <input type="text" name="cus_mobile" placeholder="Mobile Number" required>
        <input type="email" name="cus_email" placeholder="Email Address" required>
        <input type="text" name="cus_add" placeholder="City, State" required>
        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
